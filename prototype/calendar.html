<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>カレンダー - PlannerwithExpense</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="app-header">
    <span class="app-title">PlannerwithExpense</span>
    <nav>
      <a href="calendar.html" class="active">カレンダー</a>
      <a href="expenses.html">家計簿</a>
      <a href="login.html">ログアウト</a>
    </nav>
  </header>

  <main>
    <div class="calendar-title">2026年7月</div>
    <div class="toolbar">
      <button id="open-add-schedule">＋ 予定追加</button>
    </div>
    <table class="calendar-table">
      <thead>
        <tr><th>日</th><th>月</th><th>火</th><th>水</th><th>木</th><th>金</th><th>土</th></tr>
      </thead>
      <tbody id="calendar-body">
        <tr>
          <td></td><td></td><td>1</td><td>2</td><td>3</td><td>4</td>
          <td>5
            <span class="schedule-chip" data-title="買い出し" data-date="2026-07-05" data-memo="週末の買い出し">買い出し</span>
          </td>
        </tr>
        <tr>
          <td>6</td><td>7</td><td>8</td><td>9</td><td>10</td><td>11</td><td>12</td>
        </tr>
        <tr>
          <td>13</td>
          <td>14
            <span class="schedule-chip" data-title="病院" data-date="2026-07-14" data-memo="定期検診">病院</span>
          </td>
          <td>15</td><td>16</td><td>17</td><td>18</td><td>19</td>
        </tr>
        <tr>
          <td>20</td><td>21</td><td>22</td><td>23</td><td>24</td><td>25</td><td>26</td>
        </tr>
        <tr>
          <td>27</td><td>28</td><td>29</td><td>30</td><td>31</td><td></td><td></td>
        </tr>
      </tbody>
    </table>
  </main>

  <div class="modal-overlay" id="schedule-modal">
    <div class="modal-box">
      <h2 id="schedule-modal-title">予定を追加</h2>
      <form id="schedule-form">
        <div class="form-row">
          <label for="schedule-title">タイトル</label>
          <input type="text" id="schedule-title">
        </div>
        <div class="form-row">
          <label for="schedule-date">日付</label>
          <input type="date" id="schedule-date">
        </div>
        <div class="form-row">
          <label for="schedule-memo">メモ</label>
          <textarea id="schedule-memo" rows="3"></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" id="schedule-delete" class="secondary" style="display:none;">削除</button>
          <div class="right-actions">
            <button type="button" class="secondary" id="schedule-cancel">キャンセル</button>
            <button type="submit">保存</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
