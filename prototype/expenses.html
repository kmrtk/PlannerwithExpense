<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>家計簿 - PlannerwithExpense</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="app-header">
    <span class="app-title">PlannerwithExpense</span>
    <nav>
      <a href="calendar.html">カレンダー</a>
      <a href="expenses.html" class="active">家計簿</a>
      <a href="login.html">ログアウト</a>
    </nav>
  </header>

  <main>
    <div class="toolbar">
      <button id="open-add-expense">＋ 支出追加</button>
    </div>
    <table class="data-table">
      <thead>
        <tr><th>日付</th><th>カテゴリ</th><th>金額</th><th>メモ</th><th>操作</th></tr>
      </thead>
      <tbody id="expense-body">
        <tr data-amount="1200" data-date="2026-07-01" data-category="食費" data-memo="昼食">
          <td>2026-07-01</td><td>食費</td><td>1,200円</td><td>昼食</td>
          <td>
            <button class="secondary expense-edit">編集</button>
            <button class="secondary expense-delete">削除</button>
          </td>
        </tr>
        <tr data-amount="3000" data-date="2026-07-03" data-category="日用品" data-memo="">
          <td>2026-07-03</td><td>日用品</td><td>3,000円</td><td></td>
          <td>
            <button class="secondary expense-edit">編集</button>
            <button class="secondary expense-delete">削除</button>
          </td>
        </tr>
      </tbody>
    </table>
  </main>

  <div class="modal-overlay" id="expense-modal">
    <div class="modal-box">
      <h2 id="expense-modal-title">支出を追加</h2>
      <form id="expense-form">
        <div class="form-row">
          <label for="expense-amount">金額</label>
          <input type="number" id="expense-amount">
        </div>
        <div class="form-row">
          <label for="expense-date">日付</label>
          <input type="date" id="expense-date">
        </div>
        <div class="form-row">
          <label for="expense-category">カテゴリ</label>
          <input type="text" id="expense-category">
        </div>
        <div class="form-row">
          <label for="expense-memo">メモ</label>
          <textarea id="expense-memo" rows="3"></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" id="expense-delete-btn" class="secondary" style="display:none;">削除</button>
          <div class="right-actions">
            <button type="button" class="secondary" id="expense-cancel">キャンセル</button>
            <button type="submit">保存</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
